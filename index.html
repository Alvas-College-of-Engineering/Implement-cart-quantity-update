<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Shopping Cart System</h1>

        <table>

            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price (₹)</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
            </thead>

            <tbody id="cart-body">

            </tbody>

        </table>

        <h2 id="grand-total">Grand Total: ₹0</h2>

    </div>

    <script src="script.js"></script>

</body>
</html>
